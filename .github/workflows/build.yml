name: Build distributables

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  python-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: mobilecam-python-package
          path: dist/*

  desktop-executable:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: mobilecam-windows
            separator: ";"
          - os: ubuntu-latest
            artifact: mobilecam-linux-x86_64
            separator: ":"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install . pyinstaller
      - name: Build GUI executable
        shell: bash
        run: >-
          pyinstaller --noconfirm --clean --windowed --name mobilecam-bridge
          --add-data "configs${{ matrix.separator }}configs"
          src/mobilecam_platform/gui.py
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/mobilecam-bridge*
